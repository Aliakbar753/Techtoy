<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Store Login | TechToy</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .login-wrap{max-width:460px;margin:60px auto;background:#fff;padding:24px;border-radius:12px}
    .row{margin-bottom:12px}
    .row input{width:100%;padding:10px}
    .err{color:#dc2626;font-size:14px;min-height:18px}
    .ok{color:#047857;font-size:14px;min-height:18px}
    .hint{font-size:12px;color:#6b7280;margin-top:4px}
    .reset-box{margin-top:16px;padding-top:14px;border-top:1px solid #fde7d3}
    .toggle-reset{background:none;border:none;color:#c2410c;font-weight:600;cursor:pointer;padding:0}
    @media (max-width:560px){.login-wrap{margin:24px 12px;padding:14px;border-radius:10px}}
  </style>
</head>
<body>
  <div class="login-wrap">
    <h2>Store Login</h2>
    <form id="loginForm">
      <div class="row"><input id="username" placeholder="Username" required /></div>
      <div class="row"><input id="password" type="password" placeholder="Password" required /></div>
      <p id="err" class="err"></p>
      <button class="checkout-btn" type="submit">Login</button>
    </form>

    <div class="reset-box">
      <button id="toggleResetBtn" class="toggle-reset" type="button">Forgot password?</button>
      <form id="resetForm" style="display:none;margin-top:10px">
        <div class="row"><input id="resetUser" placeholder="Username" /></div>
        <div class="row"><input id="resetCode" placeholder="Reset code" /></div>
        <div class="row"><input id="newPass" type="password" placeholder="New password (min 8 chars)" /></div>
        <p class="hint">Demo reset code: <strong>techtoy-reset-2026</strong></p>
        <p id="resetMsg" class="ok"></p>
        <p id="resetErr" class="err"></p>
        <button class="secondary-btn" type="submit">Reset Password</button>
      </form>
    </div>
  </div>

  <script src="js/auth.js"></script>
  <script>
    const loginForm = document.getElementById("loginForm");
    const resetForm = document.getElementById("resetForm");
    const toggleResetBtn = document.getElementById("toggleResetBtn");
    const errNode = document.getElementById("err");
    const resetMsg = document.getElementById("resetMsg");
    const resetErr = document.getElementById("resetErr");

    loginForm.addEventListener("submit", async (e) => {
      e.preventDefault();
      errNode.textContent = "";
      const u = document.getElementById("username").value.trim();
      const p = document.getElementById("password").value.trim();
      const ok = await window.adminAuth.login(u, p);
      if (!ok) {
        errNode.textContent = "Invalid username or password";
        return;
      }
      window.location.href = "admin.html";
    });

    toggleResetBtn.addEventListener("click", () => {
      resetForm.style.display = resetForm.style.display === "none" ? "block" : "none";
      resetMsg.textContent = "";
      resetErr.textContent = "";
    });

    resetForm.addEventListener("submit", async (e) => {
      e.preventDefault();
      resetMsg.textContent = "";
      resetErr.textContent = "";

      const user = document.getElementById("resetUser").value.trim();
      const code = document.getElementById("resetCode").value.trim();
      const pass = document.getElementById("newPass").value.trim();

      const result = await window.adminAuth.resetPassword(user, pass, code);
      if (!result.ok) {
        if (result.reason === "user") resetErr.textContent = "Username does not match admin account.";
        else if (result.reason === "code") resetErr.textContent = "Invalid reset code.";
        else if (result.reason === "weak") resetErr.textContent = "Password must be at least 8 characters.";
        else resetErr.textContent = "Could not reset password.";
        return;
      }

      resetMsg.textContent = "Password reset successful. You can now login with the new password.";
      resetForm.reset();
    });
  </script>
</body>
</html>
